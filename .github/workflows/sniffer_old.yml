name: Pluto TV Sniffer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sniffer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Executar sniffer
        env:
          PLUTO_COOKIES: ${{ secrets.PLUTO_COOKIES }}
        run: python PlutoTV_sniffer.py

      - name: Commit e push dos arquivos gerados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "📁 Arquivos .txt no diretório atual:"
          ls -la *.txt || echo "⚠️ Nenhum arquivo .txt encontrado"
          
          git add -A "*.txt"
          
          if git diff --staged --quiet; then
            echo "✅ Nenhuma mudança detectada. Nada para commitar."
          else
            git commit -m "Atualiza catálogos de episódios [skip ci]"
            git push
            echo "🚀 Commit realizado com sucesso!"
          fi
