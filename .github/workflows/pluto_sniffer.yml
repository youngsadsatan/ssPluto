name: Pluto TV Sniffer

on:
  workflow_dispatch:
    inputs:
      series_input:
        description: 'ID da série ou URL'
        required: true
        default: '66d70dfaf98f52001332a8f5'

permissions:
  contents: write
  actions: read

jobs:
  sniff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar diretório de saída
        run: mkdir -p output

      - name: Executar sniffer
        env:
          SERIES_INPUT: ${{ github.event.inputs.series_input || '66d70dfaf98f52001332a8f5' }}
          PLUTO_COOKIES: ${{ secrets.PLUTO_COOKIES }}
        run: |
          python pluto_sniffer.py "$SERIES_INPUT"

      - name: Fazer upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: pluto-series-data
          path: output/*.txt
          retention-days: 7

      - name: (Opcional) Commit e push do resultado
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/*.txt || true
          git commit -m "Update series data [skip ci]" || true
          git push
